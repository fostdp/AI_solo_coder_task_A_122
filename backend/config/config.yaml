# ============================================================
#  丝绸之路医疗帐篷系统 - 主配置
#  [v2 重构] 所有模型参数与服务配置统一外置
# ============================================================

# --- ClickHouse ---
clickhouse:
  host: localhost
  port: 9000
  user: default
  password: ""
  database: silkroad_medical

# --- Redis Stream (服务间通信) ---
redis:
  host: localhost
  port: 6379
  db: 0
  password: ""
  streams:
    sensor_raw: "stream:sensor_raw"       # lora_ingest -> arrhenius / microbial
    drug_risk: "stream:drug_risk"         # arrhenius + microbial -> alert_broker
    alerts: "stream:alerts"               # alert_broker -> 通知/前端
  consumer_groups:
    arrhenius_workers: "group:arrhenius"
    microbial_workers: "group:microbial"
    alert_workers: "group:alerts"

# --- LoRa / 采集 ---
lora:
  spreading_factors: [7, 8, 9, 10, 11, 12]
  backoff_init_ms: 200
  backoff_max_ms: 8000
  retry_max: 3
  dedup_window_seconds: 60   # 去重窗口: 同一 tent_id+sensor_id+timestamp 60s 内去重
  report_interval_minutes: 30

# --- 告警阈值 ---
alerts:
  water_activity_threshold: 0.6
  temperature_threshold: 30.0
  duration_hours: 4
  check_interval_minutes: 30
  email:
    smtp_host: smtp.example.com
    smtp_port: 587
    smtp_user: ""
    smtp_password: ""
    to: archaeologist@example.com
  satellite:
    api_url: "http://satellite-gateway:8080/api/send"
    enabled: false

# --- 帐篷 (悬泉置遗址 5 座医疗帐篷) ---
tents:
  - id: 1
    name: "悬泉置·东帐"
    lat: 40.1435
    lng: 94.6635
    drugs: ["当归", "大黄", "甘草"]
  - id: 2
    name: "悬泉置·西帐"
    lat: 40.1415
    lng: 94.6600
    drugs: ["黄芪", "白术", "茯苓"]
  - id: 3
    name: "悬泉置·南帐"
    lat: 40.1405
    lng: 94.6625
    drugs: ["川芎", "白芍", "熟地"]
  - id: 4
    name: "悬泉置·北帐"
    lat: 40.1445
    lng: 94.6610
    drugs: ["桂枝", "麻黄", "细辛"]
  - id: 5
    name: "悬泉置·中帐"
    lat: 40.1420
    lng: 94.6619
    drugs: ["人参", "丹参", "五味子"]

# --- 药材参数 (Arrhenius + 光降解 + Aw 临界) ---
# Ea: 活化能 (J/mol)
# A:  指前因子 (1/s)
# T_ref: 参考温度 (K)
# shelf_life_ref_months: 参考温度下的有效期 (月)
# aw_critical: 临界水分活度
# photosensitive: 是否光敏
# k_photo, alpha, Eb: 光降解实验拟合参数
drugs:
  当归:
    arrhenius: { Ea: 85000, A: 1.2e12, T_ref: 298.15, shelf_life_ref_months: 24 }
    aw_critical: 0.65
    photosensitive: true
    light_degradation: { k_photo: 2.1e-8, alpha: 0.68, Eb: 28000 }

  大黄:
