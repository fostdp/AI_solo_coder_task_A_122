# --- Baranyi-Roberts 微生物生长模型 ---
microbial:
  mu_max_base: 0.3          # 基础最大生长速率 (/h)
  opt_temp: 25.0             # 最适温度 (°C)
  min_temp: -2.0             # 最低生长温度 (°C)
  max_temp: 45.0             # 最高生长温度 (°C)
  opt_aw: 0.95               # 最适水分活度
  min_aw: 0.60               # 最低生长水分活度
  N0: 2.0                    # 初始菌量 (log CFU/g)
  N_max: 7.0                 # 最大菌量 (log CFU/g)
  h0: 2.0                    # 延迟期参数

# --- 随机森林优先级模型 ---
priority_model:
  n_estimators: 200
  max_depth: 10
  min_samples_split: 5
  random_state: 42
  model_path: "priority_model.pkl"
  features:
    - avg_temp
    - avg_humidity
    - avg_aw
    - avg_co2
    - avg_ethylene
    - shelf_life_days
    - mold_risk
    - aw_critical_delta
  weights:
    temperature: 0.25
    aw: 0.30
    mold: 0.25
    shelf_life: 0.20
