# ============================================================
#  Nginx 配置: Gzip + 静态资源缓存 + CDN 友好 + API 反代
# ============================================================
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- 安全头 ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- Gzip 压缩 ----------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ---------- 静态资源长缓存 (CDN 友好) ----------
    # 带 hash 后缀的资源: 1 年强缓存
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires         1y;
        add_header      Cache-Control "public, max-age=31536000, immutable";
        add_header      Access-Control-Allow-Origin "*";
        access_log      off;
        try_files       $uri =404;
    }

    # ---------- HTML 协商缓存 (每次 Last-Modified) ----------
    location ~* \.html$ {
        expires         -1;
        add_header      Cache-Control "no-cache, public";
        add_header      Last-Modified $time_iso8601;
        try_files       $uri =404;
    }

    # ---------- API 反代到后端 ----------
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_buffering       off;
    }

    # ---------- Prometheus 转发 ----------
    location /metrics {
        proxy_pass         http://backend:9090/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        allow              all;
    }

    # ---------- 默认路由 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
